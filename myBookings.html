<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Bookings | Bon Voyage</title>

<link rel="stylesheet" href="about.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/3.5.0/remixicon.css">

<style>
/* BODY */
body {
    background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
    color: white;
    font-family: 'Poppins', sans-serif;
    margin: 0;
    min-height: 100vh;
}

/* NAVBAR */
.navbar {
    display: flex;
    justify-content: center;
    gap: 30px;
    padding: 15px;
    background: rgba(0, 0, 0, 0.7);
    backdrop-filter: blur(10px);
}

.nav a {
    color: white;
    text-decoration: none;
    transition: 0.3s;
}

.nav a:hover {
    color: gold;
}

/* HEADER & TOOLS */
.header-container {
    text-align: center;
    padding: 40px 20px;
}

h1 {
    color: gold;
    margin-bottom: 10px;
}

.stats-bar {
    margin-bottom: 20px;
    font-size: 1.1rem;
}

.search-box {
    margin-bottom: 30px;
}

.search-box input {
    padding: 12px 20px;
    width: 80%;
    max-width: 400px;
    border-radius: 25px;
    border: none;
    outline: none;
}

/* BOOKING CARDS */
.card {
    background: white;
    color: #333;
    margin: 20px auto;
    padding: 25px;
    border-radius: 15px;
    width: 90%;
    max-width: 700px;
    box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
    display: flex;
    justify-content: space-between;
    align-items: center;
    transition: 0.3s;
    border-left: 5px solid gold;
}

.card:hover {
    transform: translateX(10px);
}

.card-info h2 {
    margin: 0 0 10px 0;
    color: #2c5364;
}

.card-info p {
    margin: 5px 0;
    font-size: 0.95rem;
}

.total-badge {
    background: #eef2f3;
    padding: 10px 20px;
    border-radius: 10px;
    text-align: center;
}

.total-badge span {
    display: block;
    font-size: 1.4rem;
    font-weight: bold;
    color: #2c5364;
}

/* BUTTONS */
.btn-group {
    display: flex;
    flex-direction: column;
    gap: 10px;
}

button {
    padding: 10px 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}

.delete {
    background: #ff4b2b;
    color: white;
}

.delete:hover {
    background: #ff416c;
}

.clear-btn {
    background: gold;
    color: black;
    margin: 0 auto 40px auto;
    display: block;
}

.clear-btn:hover {
    background: orange;
}

/* EMPTY STATE */
.empty-state {
    text-align: center;
    padding: 50px;
}

.empty-state i {
    font-size: 4rem;
    color: rgba(255, 255, 255, 0.3);
}

.back-link {
    display: block;
    text-align: center;
    margin-top: 20px;
    color: gold;
    text-decoration: none;
}
</style>
</head>

<body>

<ul class="navbar">
    <li class="nav"><a href="hmpage.html">Home</a></li>
    <li class="nav"><a href="bookingPage.html">Book Hotels</a></li>
    <li class="nav"><a href="about.html">About</a></li>
</ul>

<div class="header-container">
    <h1><i class="ri-history-line"></i> My Booking History</h1>
    <p class="stats-bar">You have <span id="count-num" style="color: gold; font-weight: bold;">0</span> active bookings</p>
    
    <div class="search-box">
        <input type="text" id="bookingSearch" placeholder="Search by hotel name..." onkeyup="filterBookings()">
    </div>
</div>

<div id="list"></div>

<button class="clear-btn" onclick="clearAll()">
    <i class="ri-delete-bin-7-line"></i> Clear All History
</button>

<a href="bookingPage.html" class="back-link">← Continue Exploring Hotels</a>

<script>
function loadBookings() {
    let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
    let list = document.getElementById("list");
    let countNum = document.getElementById("count-num");

    countNum.innerText = bookings.length;

    if (bookings.length === 0) {
        list.innerHTML = `
            <div class="empty-state">
                <i class="ri-calendar-todo-line"></i>
                <p>No bookings found. Start your journey today!</p>
            </div>`;
        document.querySelector(".clear-btn").style.display = "none";
        return;
    }

    document.querySelector(".clear-btn").style.display = "block";
    renderList(bookings);
}

function renderList(data) {
    let html = "";
    data.forEach((b, index) => {
        html += `
        <div class="card">
            <div class="card-info">
                <h2>${b.hotel}</h2>
                <p><i class="ri-calendar-event-line"></i> <b>Booked on:</b> ${b.date}</p>
                <p><i class="ri-time-line"></i> <b>Duration:</b> ${b.days} Nights</p>
                <p><i class="ri-money-dollar-circle-line"></i> <b>Rate:</b> ₹${b.price} / night</p>
            </div>

            <div class="total-badge">
                <small>Total Paid</small>
                <span>₹${b.total}</span>
                <button class="delete" onclick="deleteBooking(${index})">
                    <i class="ri-close-line"></i> Remove
                </button>
            </div>
        </div>
        `;
    });
    document.getElementById("list").innerHTML = html;
}

function filterBookings() {
    let query = document.getElementById("bookingSearch").value.toLowerCase();
    let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
    
    let filtered = bookings.filter(b => b.hotel.toLowerCase().includes(query));
    renderList(filtered);
}

function deleteBooking(index) {
    if(confirm("Are you sure you want to remove this record?")) {
        let bookings = JSON.parse(localStorage.getItem("bookings")) || [];
        bookings.splice(index, 1);
        localStorage.setItem("bookings", JSON.stringify(bookings));
        loadBookings();
    }
}

function clearAll() {
    if(confirm("This will permanently delete all your booking history. Proceed?")) {
        localStorage.removeItem("bookings");
        loadBookings();
    }
}

// Initial Call
loadBookings();
</script>

</body>
</html>
